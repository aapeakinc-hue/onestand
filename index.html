    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: "LXGW WenKai", "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
            background: #f5f3f0;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: #fffef9;
        }

        /* 顶部标题栏 */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 20px 32px;
            background: linear-gradient(135deg, #fffef9 0%, #f8f4ed 100%);
            border-bottom: 1px solid #e8e0d5;
            flex-shrink: 0;
        }

        .logo {
            width: 48px;
            height: 48px;
            border-radius: 8px;
        }

        .header-text {
            font-size: 26px;
            font-weight: 400;
            letter-spacing: 4px;
            color: #8b4413;
            font-family: "LXGW WenKai", "STLiti", "隶书", serif;
        }

        /* 一级分类 - 横向滚动 */
        .main-categories {
            display: flex;
            gap: 0;
            background: #f8f4ed;
            border-bottom: 1px solid #e8e0d5;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .main-categories::-webkit-scrollbar {
            height: 0;
        }

        .main-category {
            padding: 14px 28px;
            background: transparent;
            color: #8b7355;
            border: none;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s ease;
            font-weight: 400;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
        }

        .main-category:hover {
            color: #8b4413;
            background: #fffef9;
        }

        .main-category.active {
            color: #8b4413;
            background: #fffef9;
            border-bottom-color: #8b4413;
            font-weight: 500;
        }

        /* 二级分类 + 推荐问题 - 合并区域 */
        .category-section {
            display: flex;
            flex-direction: column;
            background: #fffef9;
            border-bottom: 1px solid #e8e0d5;
            flex-shrink: 0;
            max-height: 120px;
            overflow: hidden;
        }

        .sub-categories {
            display: flex;
            flex-wrap: nowrap;
            gap: 10px;
            padding: 12px 24px 8px;
            overflow-x: auto;
        }

        .sub-categories::-webkit-scrollbar {
            height: 0;
        }

        .sub-category {
            padding: 6px 16px;
            border: 1px solid #d8cdb8;
            background: #faf8f5;
            color: #8b7355;
            border-radius: 18px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            font-weight: 400;
            white-space: nowrap;
        }

        .sub-category:hover {
            background: #fff;
            border-color: #8b4413;
            color: #8b4413;
        }

        .sub-category.active {
            background: #8b4413;
            color: #fff;
            border-color: #8b4413;
        }

        .suggested-questions {
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            padding: 0 24px 12px;
            overflow-x: auto;
            align-items: center;
        }

        .suggested-questions::-webkit-scrollbar {
            height: 0;
        }

        .suggested-questions-label {
            font-size: 12px;
            color: #b8a890;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .suggested-question {
            padding: 5px 12px;
            background: #fff;
            border: 1px solid #e8e0d5;
            border-radius: 14px;
            font-size: 12px;
            color: #8b7355;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .suggested-question:hover {
            background: #8b4413;
            color: #fff;
            border-color: #8b4413;
        }

        /* 聊天区域 - 核心区域，自动填充剩余空间 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            background: #faf8f5;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #d8cdb8;
            border-radius: 3px;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 14px 20px;
            border-radius: 18px;
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 15px;
        }

        .message.user .message-content {
            background: #8b4413;
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 10px rgba(139, 68, 19, 0.15);
        }

        .message.assistant .message-content {
            background: #fff;
            color: #5a4a3a;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 10px rgba(139, 68, 19, 0.06);
            border: 1px solid #e8e0d5;
        }

        /* 底部输入区域 */
        .input-area {
            padding: 16px 32px 20px;
            background: #fffef9;
            border-top: 1px solid #e8e0d5;
            flex-shrink: 0;
        }

        .current-category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: linear-gradient(135deg, #f8f4ed 0%, #fff 100%);
            border: 1px solid #d8cdb8;
            border-radius: 16px;
            font-size: 12px;
            color: #8b4413;
            margin-bottom: 12px;
        }

        .current-category-icon {
            width: 16px;
            height: 16px;
            background: #8b4413;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #d8cdb8;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
            background: #faf8f5;
            font-family: inherit;
        }

        input[type="text"]:focus {
            border-color: #8b4413;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(139, 68, 19, 0.08);
        }

        input[type="text"]::placeholder {
            color: #b8a890;
        }

        button.send-btn {
            padding: 14px 32px;
            background: #8b4413;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(139, 68, 19, 0.2);
            font-family: inherit;
        }

        button.send-btn:hover {
            background: #a0522d;
            transform: translateY(-1px);
            box-shadow: 0 5px 16px rgba(139, 68, 19, 0.25);
        }

        button.send-btn:active {
            transform: translateY(0);
        }

        button.send-btn:disabled {
            background: #c8b8a8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .typing {
            display: flex;
            gap: 6px;
            padding: 14px 20px;
            background: #fff;
            border-radius: 18px;
            border: 1px solid #e8e0d5;
            box-shadow: 0 2px 10px rgba(139, 68, 19, 0.06);
            max-width: 70px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #8b4413;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* 引导提示 */
        .guide-hint {
            text-align: center;
            padding: 20px;
            margin: 10px 0;
            background: linear-gradient(135deg, #fff 0%, #faf8f5 100%);
            border: 1px dashed #d8cdb8;
            border-radius: 12px;
            animation: fadeIn 0.5s ease 0.3s backwards, pulse 2s ease-in-out infinite 1s;
        }

        .hint-text {
            font-size: 14px;
            color: #8b4413;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .hint-sub {
            font-size: 12px;
            color: #b8a890;
            margin: 0;
        }

        @keyframes pulse {
            0%, 100% { 
                box-shadow: 0 0 0 0 rgba(139, 68, 19, 0.4); 
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 0 10px rgba(139, 68, 19, 0); 
                transform: scale(1.02);
            }
        }

        /* 开始对话按钮 */
        .start-chat-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            padding: 18px 32px;
            background: linear-gradient(135deg, #8b4413 0%, #a0522d 100%);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 68, 19, 0.3);
            font-family: inherit;
            animation: fadeIn 0.6s ease 0.8s backwards, buttonPulse 2s ease-in-out infinite 2s;
        }

        .start-chat-btn:hover {
            background: linear-gradient(135deg, #a0522d 0%, #8b4413 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 68, 19, 0.4);
        }

        .start-chat-btn:active {
            transform: translateY(0);
        }

        @keyframes buttonPulse {
            0%, 100% { 
                box-shadow: 0 4px 15px rgba(139, 68, 19, 0.3);
            }
            50% { 
                box-shadow: 0 4px 25px rgba(139, 68, 19, 0.5);
            }
        }

        /* 示例对话 */
        .demo-conversation {
            margin: 15px 0;
            padding: 15px 20px;
            background: rgba(139, 68, 19, 0.05);
            border-radius: 12px;
            animation: slideIn 0.8s ease 1.2s backwards;
        }

        .demo-message {
            margin-bottom: 12px;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.6;
        }

        .demo-message.user {
            background: #8b4413;
            color: #fff;
            margin-left: 20%;
            text-align: right;
        }

        .demo-message.assistant {
            background: #fff;
            color: #5a4a3a;
            margin-right: 20%;
            border: 1px solid #e8e0d5;
        }

        .demo-label {
            font-size: 11px;
            color: #b8a890;
            text-align: center;
            margin-bottom: 8px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .footer {
            text-align: center;
            padding: 8px;
            color: #b8a890;
            font-size: 11px;
            background: #fffef9;
            letter-spacing: 1px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .container {
                max-width: 100%;
            }

            .header {
                padding: 16px 20px;
                gap: 12px;
            }

            .logo {
                width: 40px;
                height: 40px;
            }

            .header-text {
                font-size: 22px;
                letter-spacing: 3px;
            }

            .main-category {
                padding: 12px 20px;
                font-size: 14px;
            }

            .sub-categories {
                padding: 10px 16px 6px;
                gap: 8px;
            }

            .sub-category {
                padding: 5px 12px;
                font-size: 12px;
            }

            .suggested-questions {
                padding: 0 16px 10px;
                gap: 6px;
            }

            .suggested-question {
                padding: 4px 10px;
                font-size: 11px;
            }

            .chat-container {
                padding: 16px 20px;
            }

            .message-content {
                max-width: 85%;
                padding: 12px 16px;
                font-size: 14px;
            }

            .input-area {
                padding: 12px 16px 16px;
            }

            .current-category {
                font-size: 11px;
                padding: 4px 10px;
            }

            input[type="text"] {
                padding: 14px 18px;
                font-size: 15px;
            }

            button.send-btn {
                padding: 14px 28px;
                font-size: 15px;
            }

            .start-chat-btn {
                padding: 16px 24px;
                font-size: 15px;
                margin: 15px auto;
            }

            .guide-hint {
                padding: 15px;
            }

            .hint-text {
                font-size: 13px;
            }

            .hint-sub {
                font-size: 11px;
            }

            .demo-conversation {
                padding: 12px 16px;
            }

            .demo-message {
                font-size: 12px;
                padding: 8px 12px;
            }
        }
    </style>

</head>
<body>
    <div class="container">
        <!-- 顶部标题栏 -->
        <div class="header">
            <img src="logo.jpg" alt="一弭" class="logo" />
            <span class="header-text">人生智慧 · 一弭化解</span>
        </div>

        <!-- 一级分类 -->
        <div class="main-categories" id="mainCategories">
            <button class="main-category active" data-category="workplace">职场事业</button>
            <button class="main-category" data-category="social">人际交往</button>
            <button class="main-category" data-category="love">情感婚恋</button>
            <button class="main-category" data-category="family">家庭关系</button>
            <button class="main-category" data-category="life">人生规划</button>
            <button class="main-category" data-category="mental">心理调适</button>
            <button class="main-category" data-category="growth">自我提升</button>
        </div>

        <!-- 二级分类 + 推荐问题 -->
        <div class="category-section">
            <div class="sub-categories" id="subCategories"></div>
            <div class="suggested-questions" id="suggestedQuestions"></div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-content">你好，我是一弭。🌿 在这里，你可以自由倾诉，我会用中西融合的智慧，陪你一起化解困惑。</div>
            </div>
            <button class="start-chat-btn" id="startChatBtn">🌿 点击开始对话</button>
            <div class="demo-conversation" id="demoConversation">
                <p class="demo-label">💬 对话示例</p>
                <div class="demo-message user">同事总是针对我怎么办？</div>
                <div class="demo-message assistant">我能理解你的委屈。在职场中，这种情况往往不是你的错...</div>
            </div>
            <div class="guide-hint">
                <p class="hint-text">💡 点击下方推荐问题，快速开始对话</p>
                <p class="hint-sub">或者直接在输入框中告诉我你的困扰</p>
            </div>
        </div>

        <!-- 底部输入区域 -->
        <div class="input-area">
            <div class="current-category" id="currentCategory">
                <span class="current-category-icon">✓</span>
                <span id="categoryText">职场事业 · 职场人际关系</span>
            </div>
            <div class="input-group">
                <input type="text" id="userInput" placeholder="点击上方问题，或在这里输入你的困惑..." />
                <button class="send-btn" id="sendBtn">发送</button>
            </div>
        </div>

        <div class="footer">onestand.cn · 一弭</div>
    </div>

    <script>
        // 分类配置
        const CATEGORIES = {
            workplace: {

                subs: [

            love: {

                    { id: 'parenting', name: '亲子教育问题', questions: ['孩子不听话怎么办？', '孩子成绩差怎么引导？', '如何与青春期孩子沟通？'] },
                    { id: 'parents', name: '父母相处之道', questions: ['父母不理解我怎么办？', '父母总是唠叨怎么应对？', '如何尽孝又不委屈自己？'] },
