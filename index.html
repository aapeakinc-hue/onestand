<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: "LXGW WenKai", "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
            background: #f5f3f0;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: #fffef9;
        }

        /* 顶部标题栏 */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 20px 32px;
            background: linear-gradient(135deg, #fffef9 0%, #f8f4ed 100%);
            border-bottom: 1px solid #e8e0d5;
            flex-shrink: 0;
        }

        .logo {
            width: 48px;
            height: 48px;
            border-radius: 8px;
        }

        .header-text {
            font-size: 26px;
            font-weight: 400;
            letter-spacing: 4px;
            color: #8b4413;
            font-family: "LXGW WenKai", "STLiti", "隶书", serif;
        }

        /* 一级分类 - 横向滚动 */
        .main-categories {
            display: flex;
            gap: 0;
            background: #f8f4ed;
            border-bottom: 1px solid #e8e0d5;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .main-categories::-webkit-scrollbar {
            height: 0;
        }

        .main-category {
            padding: 14px 28px;
            background: transparent;
            color: #8b7355;
            border: none;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s ease;
            font-weight: 400;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
        }

        .main-category:hover {
            color: #8b4413;
            background: #fffef9;
        }

        .main-category.active {
            color: #8b4413;
            background: #fffef9;
            border-bottom-color: #8b4413;
            font-weight: 500;
        }

        /* 二级分类 + 推荐问题 - 合并区域 */
        .category-section {
            display: flex;
            flex-direction: column;
            background: #fffef9;
            border-bottom: 1px solid #e8e0d5;
            flex-shrink: 0;
            max-height: 160px;
            overflow: visible;
        }

        .sub-categories {
            display: flex;
            flex-wrap: nowrap;
            gap: 10px;
            padding: 12px 24px 8px;
            overflow-x: auto;
        }

        .sub-categories::-webkit-scrollbar {
            height: 0;
        }

        .sub-category {
            padding: 6px 16px;
            border: 1px solid #d8cdb8;
            background: #faf8f5;
            color: #8b7355;
            border-radius: 18px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            font-weight: 400;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .sub-category:hover {
            background: #fff;
            border-color: #8b4413;
            color: #8b4413;
        }

        .sub-category.active {
            background: #8b4413;
            color: #fff;
            border-color: #8b4413;
        }

        .suggested-questions {
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            padding: 8px 24px 12px;
            overflow-x: auto;
            overflow-y: visible;
            align-items: center;
        }

        .suggested-questions::-webkit-scrollbar {
            height: 0;
        }

        .suggested-questions-label {
            font-size: 12px;
            color: #8b4413;
            white-space: nowrap;
            flex-shrink: 0;
            font-weight: 500;
            background: linear-gradient(135deg, #f8f4ed 0%, #fff 100%);
            padding: 5px 10px;
            border-radius: 12px;
            border: 1px solid #d8cdb8;
        }

        .suggested-question {
            padding: 6px 14px;
            background: #fff;
            border: 1px solid #e8e0d5;
            border-radius: 16px;
            font-size: 12px;
            color: #8b7355;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .suggested-question:hover {
            background: #8b4413;
            color: #fff;
            border-color: #8b4413;
            transform: translateY(-2px);
        }

        /* 热点话题标签 */
        .hot-topic {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: #fff;
            border-color: #e74c3c;
        }

        .hot-topic:hover {
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
        }

        /* 聊天区域 - 核心区域，自动填充剩余空间 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            background: #faf8f5;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #d8cdb8;
            border-radius: 3px;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 14px 20px;
            border-radius: 18px;
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 15px;
        }

        .message.user .message-content {
            background: #8b4413;
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 10px rgba(139, 68, 19, 0.15);
        }

        .message.assistant .message-content {
            background: #fff;
            color: #5a4a3a;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 10px rgba(139, 68, 19, 0.06);
            border: 1px solid #e8e0d5;
        }

        /* 底部输入区域 */
        .input-area {
            padding: 16px 32px 20px;
            background: #fffef9;
            border-top: 1px solid #e8e0d5;
            flex-shrink: 0;
        }

        .current-category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: linear-gradient(135deg, #f8f4ed 0%, #fff 100%);
            border: 1px solid #d8cdb8;
            border-radius: 16px;
            font-size: 12px;
            color: #8b4413;
            margin-bottom: 12px;
        }

        .current-category-icon {
            width: 16px;
            height: 16px;
            background: #8b4413;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 60px 16px 20px;
            border: 1px solid #d8cdb8;
            border-radius: 28px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
            background: #faf8f5;
            font-family: inherit;
        }

        input[type="text"]:focus {
            border-color: #8b4413;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(139, 68, 19, 0.08);
        }

        input[type="text"]::placeholder {
            color: #b8a890;
        }

        /* 语音按钮 - 更大更明显 */
        .voice-btn {
            position: absolute;
            right: 8px;
            width: 44px;
            height: 44px;
            border: 2px solid #d8cdb8;
            background: linear-gradient(135deg, #fff 0%, #faf8f5 100%);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 20px;
            color: #8b4413;
            box-shadow: 0 2px 8px rgba(139, 68, 19, 0.1);
            z-index: 10;
        }

        .voice-btn:hover {
            background: linear-gradient(135deg, #8b4413 0%, #a0522d 100%);
            color: #fff;
            border-color: #8b4413;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(139, 68, 19, 0.3);
        }

        .voice-btn.recording {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: #fff;
            border-color: #e74c3c;
            animation: voicePulse 1s ease-in-out infinite;
        }

        .voice-btn::after {
            content: '语音';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #8b7355;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .voice-btn:hover::after {
            opacity: 1;
        }

        @keyframes voicePulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            50% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
        }

        /* 语音指示器 */
        .voice-indicator {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(139, 68, 19, 0.95);
            color: #fff;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .voice-indicator.active {
            display: block;
        }

        .voice-indicator .icon {
            font-size: 64px;
            margin-bottom: 15px;
            animation: voiceWave 1.5s ease-in-out infinite;
        }

        @keyframes voiceWave {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .voice-indicator .text {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .voice-indicator .hint {
            font-size: 14px;
            opacity: 0.8;
        }

        button.send-btn {
            padding: 16px 36px;
            background: linear-gradient(135deg, #8b4413 0%, #a0522d 100%);
            color: #fff;
            border: none;
            border-radius: 28px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(139, 68, 19, 0.2);
            font-family: inherit;
        }

        button.send-btn:hover {
            background: linear-gradient(135deg, #a0522d 0%, #8b4413 100%);
            transform: translateY(-1px);
            box-shadow: 0 5px 16px rgba(139, 68, 19, 0.25);
        }

        button.send-btn:active {
            transform: translateY(0);
        }

        button.send-btn:disabled {
            background: #c8b8a8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .typing {
            display: flex;
            gap: 6px;
            padding: 14px 20px;
            background: #fff;
            border-radius: 18px;
            border: 1px solid #e8e0d5;
            box-shadow: 0 2px 10px rgba(139, 68, 19, 0.06);
            max-width: 70px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #8b4413;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* 引导提示 */
        .guide-hint {
            text-align: center;
            padding: 20px;
            margin: 10px 0;
            background: linear-gradient(135deg, #fff 0%, #faf8f5 100%);
            border: 1px dashed #d8cdb8;
            border-radius: 12px;
            animation: fadeIn 0.5s ease 0.3s backwards, pulse 2s ease-in-out infinite 1s;
        }

        .hint-text {
            font-size: 14px;
            color: #8b4413;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .hint-sub {
            font-size: 12px;
            color: #b8a890;
            margin: 0;
        }

        @keyframes pulse {
            0%, 100% { 
                box-shadow: 0 0 0 0 rgba(139, 68, 19, 0.4); 
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 0 10px rgba(139, 68, 19, 0); 
                transform: scale(1.02);
            }
        }

        /* 开始对话按钮 */
        .start-chat-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            padding: 18px 32px;
            background: linear-gradient(135deg, #8b4413 0%, #a0522d 100%);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 68, 19, 0.3);
            font-family: inherit;
            animation: fadeIn 0.6s ease 0.8s backwards, buttonPulse 2s ease-in-out infinite 2s;
        }

        .start-chat-btn:hover {
            background: linear-gradient(135deg, #a0522d 0%, #8b4413 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 68, 19, 0.4);
        }

        .start-chat-btn:active {
            transform: translateY(0);
        }

        @keyframes buttonPulse {
            0%, 100% { 
                box-shadow: 0 4px 15px rgba(139, 68, 19, 0.3);
            }
            50% { 
                box-shadow: 0 4px 25px rgba(139, 68, 19, 0.5);
            }
        }

        /* 示例对话 */
        .demo-conversation {
            margin: 15px 0;
            padding: 15px 20px;
            background: rgba(139, 68, 19, 0.05);
            border-radius: 12px;
            animation: slideIn 0.8s ease 1.2s backwards;
        }

        .demo-message {
            margin-bottom: 12px;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.6;
        }

        .demo-message.user {
            background: #8b4413;
            color: #fff;
            margin-left: 20%;
            text-align: right;
        }

        .demo-message.assistant {
            background: #fff;
            color: #5a4a3a;
            margin-right: 20%;
            border: 1px solid #e8e0d5;
        }

        .demo-label {
            font-size: 11px;
            color: #b8a890;
            text-align: center;
            margin-bottom: 8px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .footer {
            text-align: center;
            padding: 8px;
            color: #b8a890;
            font-size: 11px;
            background: #fffef9;
            letter-spacing: 1px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .container {
                max-width: 100%;
            }

            .header {
                padding: 16px 20px;
                gap: 12px;
            }

            .logo {
                width: 40px;
                height: 40px;
            }

            .header-text {
                font-size: 22px;
                letter-spacing: 3px;
            }

            .main-category {
                padding: 12px 20px;
                font-size: 14px;
            }

            .sub-categories {
                padding: 10px 16px 6px;
                gap: 8px;
            }

            .sub-category {
                padding: 5px 12px;
                font-size: 12px;
            }

            .suggested-questions {
                padding: 8px 16px 10px;
                gap: 6px;
            }

            .suggested-question {
                padding: 5px 12px;
                font-size: 11px;
            }

            .chat-container {
                padding: 16px 20px;
            }

            .message-content {
                max-width: 85%;
                padding: 12px 16px;
                font-size: 14px;
            }

            .input-area {
                padding: 12px 16px 16px;
            }

            .current-category {
                font-size: 11px;
                padding: 4px 10px;
            }

            input[type="text"] {
                padding: 16px 60px 16px 18px;
                font-size: 15px;
            }

            .voice-btn {
                width: 48px;
                height: 48px;
                right: 6px;
                font-size: 22px;
            }

            button.send-btn {
                padding: 16px 32px;
                font-size: 15px;
            }

            .start-chat-btn {
                padding: 16px 24px;
                font-size: 15px;
                margin: 15px auto;
            }

            .guide-hint {
                padding: 15px;
            }

            .hint-text {
                font-size: 13px;
            }

            .hint-sub {
                font-size: 11px;
            }

            .demo-conversation {
                padding: 12px 16px;
            }

            .demo-message {
                font-size: 12px;
                padding: 8px 12px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 顶部标题栏 -->
        <div class="header">
            <img src="logo.jpg" alt="一弭" class="logo" />
            <span class="header-text">人生智慧 · 一弭化解</span>
        </div>

        <!-- 一级分类 -->
        <div class="main-categories" id="mainCategories">
            <button class="main-category active" data-category="workplace">职场事业</button>
            <button class="main-category" data-category="social">人际交往</button>
            <button class="main-category" data-category="love">情感婚恋</button>
            <button class="main-category" data-category="family">家庭关系</button>
            <button class="main-category" data-category="life">人生规划</button>
            <button class="main-category" data-category="mental">心理调适</button>
            <button class="main-category" data-category="growth">自我提升</button>
        </div>

        <!-- 二级分类 + 推荐问题 -->
        <div class="category-section">
            <div class="sub-categories" id="subCategories"></div>
            <div class="suggested-questions" id="suggestedQuestions"></div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-content">你好，我是一弭。🌿 在这里，你可以自由倾诉，我会用中西融合的智慧，陪你一起化解困惑。</div>
            </div>
            <button class="start-chat-btn" id="startChatBtn">🌿 点击开始对话</button>
            <div class="demo-conversation" id="demoConversation">
                <p class="demo-label">💬 对话示例</p>
                <div class="demo-message user">同事总是针对我怎么办？</div>
                <div class="demo-message assistant">我能理解你的委屈。在职场中，这种情况往往不是你的错...</div>
            </div>
            <div class="guide-hint">
                <p class="hint-text">💡 点击上方推荐问题，快速开始对话</p>
                <p class="hint-sub">或者点击右侧🎤按钮，用语音告诉我你的困扰</p>
            </div>
        </div>

        <!-- 语音指示器 -->
        <div class="voice-indicator" id="voiceIndicator">
            <div class="icon">🎤</div>
            <div class="text">正在聆听...</div>
            <div class="hint">点击停止或再次点击麦克风图标</div>
        </div>

        <!-- 底部输入区域 -->
        <div class="input-area" id="inputArea">
            <div class="current-category" id="currentCategory">
                <span class="current-category-icon">✓</span>
                <span id="categoryText">职场事业 · 职场人际关系</span>
            </div>
            <div class="input-group">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="点击推荐问题，或点击🎤语音输入..." />
                    <button class="voice-btn" id="voiceBtn" title="语音输入">🎤</button>
                </div>
                <button class="send-btn" id="sendBtn">发送</button>
            </div>
        </div>

        <div class="footer">onestand.cn · 一弭</div>
    </div>

    <script>
        // 分类配置
        const CATEGORIES = {
            workplace: {
                name: '职场事业',
                subs: [
                    { id: 'workplace-conflict', name: '职场人际关系', questions: ['同事总是针对我怎么办？', '领导不信任我如何破局？', '如何拒绝同事的无理要求？'] },
                    { id: 'career-plan', name: '职业发展规划', questions: ['感觉工作没前途怎么办？', '30岁了还没方向怎么破？', '如何判断该不该跳槽？'] },
                    { id: 'work-pressure', name: '工作压力应对', questions: ['工作压力大想辞职怎么办？', '如何应对职场内卷？', '加班太多身体吃不消怎么办？'] },
                    { id: 'job-hop', name: '跳槽转型决策', questions: ['现在跳槽时机对吗？', '转行要做什么准备？', '裸辞风险大吗？'] },
                    { id: 'startup', name: '创业管理难题', questions: ['创业失败了怎么面对？', '合伙人有矛盾怎么办？', '资金链紧张如何应对？'] },
                    { id: 'promotion', name: '职场晋升策略', questions: ['如何争取升职加薪？', '业绩好却不被提拔怎么办？', '如何让领导看到我的价值？'] }
                ]
            },
            social: {

        // 每日热点（根据日期动态生成）
        function getDailyHotTopics() {
            const today = new Date();
            const dayOfWeek = today.getDay(); // 0-6, 0 is Sunday
            
            // 根据星期几生成不同的热点话题
            const hotTopics = [
                // 周一 - 职场主题
                ['周一综合症怎么办？', '如何快速进入工作状态？', '周一开会太多怎么应对？'],
                // 周二 - 人际主题
                ['如何和难相处的同事相处？', '怎么拒绝不想去的饭局？', '职场中如何建立好人缘？'],
                // 周三 - 情感主题
                ['周三情绪低落怎么办？', '如何保持恋爱新鲜感？', '感觉孤独了怎么缓解？'],
                // 周四 - 家庭主题
                ['婆媳矛盾怎么化解？', '孩子不听话怎么办？', '如何平衡工作和家庭？'],
                // 周五 - 人生主题
                ['周末如何安排才不虚度？', '35岁焦虑怎么办？', '如何找到人生意义？'],
                // 周六 - 心理主题
                ['周末失眠怎么办？', '如何缓解焦虑情绪？', '总觉得不自信怎么破？'],
                // 周日 - 自我提升
                ['如何制定下周计划？', '怎么培养阅读习惯？', '如何提升个人魅力？']
            ];
            
            return hotTopics[dayOfWeek] || hotTopics[0];
        }

        let currentMainCategory = 'workplace';
        let currentSubCategory = 'workplace-conflict';
        let history = [];
        let isFirstMessage = true;
        let recognition = null;
        let isRecording = false;

        function init() {
            renderSubCategories('workplace');
            updateCategoryDisplay();
            initVoiceRecognition();

            document.querySelectorAll('.main-category').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.main-category').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentMainCategory = this.dataset.category;
                    renderSubCategories(currentMainCategory);
                    updateCategoryDisplay();
                });
            });

            // 开始对话按钮事件
            document.getElementById('startChatBtn').addEventListener('click', function() {
                const inputArea = document.getElementById('inputArea');
                inputArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => {
                    document.getElementById('userInput').focus();
                }, 300);
                
                // 添加视觉反馈
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 100);
            });
        }

        function updateCategoryDisplay() {
            const main = CATEGORIES[currentMainCategory];
            const sub = main.subs.find(s => s.id === currentSubCategory);
            document.getElementById('categoryText').textContent = `${main.name} · ${sub ? sub.name : ''}`;
        }

        function renderSubCategories(mainCategory) {
            const container = document.getElementById('subCategories');
            const category = CATEGORIES[mainCategory];

            container.innerHTML = category.subs.map((sub, i) => 
                `<button class="sub-category ${i === 0 ? 'active' : ''}" data-id="${sub.id}">${sub.name}</button>`
            ).join('');

            currentSubCategory = category.subs[0].id;
            renderQuestions(category.subs[0]);
            updateCategoryDisplay();

            container.querySelectorAll('.sub-category').forEach(btn => {
                btn.addEventListener('click', function() {
                    container.querySelectorAll('.sub-category').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentSubCategory = this.dataset.id;
                    const sub = category.subs.find(s => s.id === currentSubCategory);
                    renderQuestions(sub);
                    updateCategoryDisplay();
                });
            });
        }

        function renderQuestions(sub) {
            const container = document.getElementById('suggestedQuestions');
            if (!sub || !sub.questions) { 
                console.log('sub or sub.questions is undefined:', sub);
                container.innerHTML = ''; 
                return; 
            }
            
            // 获取每日热点
            const hotTopics = getDailyHotTopics();
            
            // 合并推荐问题和热点话题
            const allQuestions = [
                ...hotTopics.map(q => ({ text: q, isHot: true })),
                ...sub.questions.map(q => ({ text: q, isHot: false }))
            ];
            
            const questionsHTML = allQuestions.map(q => 
                `<button class="suggested-question ${q.isHot ? 'hot-topic' : ''}" title="${q.isHot ? '🔥 今日热点' : ''}">
                    ${q.isHot ? '🔥 ' : ''}${q.text}
                </button>`
            ).join('');
            
            container.innerHTML = `<span class="suggested-questions-label">推荐：</span>` + questionsHTML;
            
            console.log('Questions rendered with hot topics:', allQuestions);
            
            container.querySelectorAll('.suggested-question').forEach(btn => {
                btn.addEventListener('click', function() {
                    const questionText = this.textContent.replace('🔥 ', '');
                    document.getElementById('userInput').value = questionText;
                    document.getElementById('userInput').focus();
                    // 自动发送消息
                    setTimeout(() => sendMessage(), 300);
                });
            });
        }

        // 语音识别功能 - 增强版
        function initVoiceRecognition() {
            console.log('初始化语音识别...');
            
            // 检测浏览器支持的语音识别API
            const SpeechRecognition = window.SpeechRecognition || 
                                      window.webkitSpeechRecognition || 
                                      window.mozSpeechRecognition || 
                                      window.msSpeechRecognition;
            
            if (!SpeechRecognition) {
                console.log('浏览器不支持语音识别，将尝试备用方案');
                alert('您的浏览器可能不支持语音识别功能。建议使用 Chrome、Edge 或 Safari 浏览器。');
                document.getElementById('voiceBtn').style.opacity = '0.5';
                document.getElementById('voiceBtn').style.cursor = 'not-allowed';
                return;
            }

            try {
                recognition = new SpeechRecognition();
                recognition.lang = 'zh-CN';
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onstart = function() {
                    isRecording = true;
                    document.getElementById('voiceBtn').classList.add('recording');
                    document.getElementById('voiceIndicator').classList.add('active');
                    console.log('语音识别已启动');
                };

                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript;
                    const confidence = event.results[0][0].confidence;
                    console.log('识别结果:', transcript, '置信度:', confidence);
                    
                    // 如果置信度太低，提示用户重试
                    if (confidence < 0.5) {
                        console.log('识别置信度较低:', confidence);
                    }
                    
                    document.getElementById('userInput').value = transcript;
                };

                recognition.onerror = function(event) {
                    console.error('语音识别错误:', event.error);
                    let errorMessage = '语音识别失败';
                    
                    switch(event.error) {
                        case 'no-speech':
                            errorMessage = '未检测到语音，请重试';
                            break;
                        case 'audio-capture':
                            errorMessage = '无法访问麦克风，请检查设备设置';
                            break;
                        case 'not-allowed':
                            errorMessage = '麦克风权限被拒绝，请在浏览器设置中允许';
                            break;
                        case 'network':
                            errorMessage = '网络连接失败，请检查网络';
                            break;
                        case 'aborted':
                            errorMessage = '语音识别被中断';
                            break;
                        default:
                            errorMessage = '语音识别失败: ' + event.error;
                    }
                    
                    alert(errorMessage);
                    stopRecording();
                };

                recognition.onend = function() {
                    console.log('语音识别结束');
                    stopRecording();
                };

                // 绑定语音按钮事件
                document.getElementById('voiceBtn').addEventListener('click', toggleRecording);
                document.getElementById('voiceIndicator').addEventListener('click', toggleRecording);
                
                console.log('语音识别初始化成功');
            } catch (e) {
                console.error('语音识别初始化失败:', e);
                alert('语音识别初始化失败，请刷新页面重试');
            }
        }

        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            if (!recognition) {
                alert('您的浏览器不支持语音识别功能。建议使用 Chrome、Edge 或 Safari 浏览器。');
                return;
            }

            try {
                recognition.start();
                console.log('开始录音...');
            } catch (e) {
                console.error('启动语音识别失败:', e);
                if (e.message.includes('already started')) {
                    stopRecording();
                    setTimeout(() => startRecording(), 100);
                } else {
                    alert('启动语音识别失败: ' + e.message);
                }
            }
        }

        function stopRecording() {
            if (recognition && isRecording) {
                try {
                    recognition.stop();
                    console.log('停止录音...');
                } catch (e) {
                    console.error('停止语音识别失败:', e);
                }
            }
            
            isRecording = false;
            document.getElementById('voiceBtn').classList.remove('recording');
            document.getElementById('voiceIndicator').classList.remove('active');
        }

        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="message-content">${content}</div>`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typing';
            div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('typing');
            if (t) t.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // 如果是第一条消息，隐藏所有引导元素
            if (isFirstMessage) {
                const startBtn = document.getElementById('startChatBtn');
                const demoConv = document.getElementById('demoConversation');
                const guideHint = document.querySelector('.guide-hint');
                
                if (startBtn) {
                    startBtn.style.opacity = '0';
                    startBtn.style.transform = 'scale(0.9)';
                    setTimeout(() => startBtn.remove(), 300);
                }
                
                if (demoConv) {
                    demoConv.style.opacity = '0';
                    setTimeout(() => demoConv.remove(), 300);
                }
                
                if (guideHint) {
                    guideHint.style.opacity = '0';
                    setTimeout(() => guideHint.remove(), 300);
                }
                
                isFirstMessage = false;
            }

            addMessage('user', message);
            userInput.value = '';
            sendBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, category: currentSubCategory, history: history.slice(-4) })
                });
                const data = await res.json();
                removeTyping();
                if (data.success) {
                    addMessage('assistant', data.reply);
                    history.push({ role: 'user', content: message }, { role: 'assistant', content: data.reply });
                } else {
                    addMessage('assistant', `抱歉：${data.error}`);
                }
            } catch (e) {
                removeTyping();
                addMessage('assistant', '网络异常，请稍后再试。');
            }
            sendBtn.disabled = false;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

        init();
    </script>
