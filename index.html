<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一弭 - 人生智慧指引</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            max-width: 840px;
            width: 100%;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4A90E2 0%, #5BA0F2 100%);
            color: white;
            padding: 32px 40px;
            text-align: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 40px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 4px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.95;
            font-weight: 300;
        }

        .category-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 24px 32px;
            border-bottom: 1px solid #f0f0f0;
            justify-content: center;
            flex-shrink: 0;
            background: #fafbfc;
        }

        .category-btn {
            padding: 8px 20px;
            border: 1px solid #e0e6ed;
            background: white;
            color: #5a6d82;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            font-weight: 400;
        }

        .category-btn:hover {
            background: #f8f9fa;
            border-color: #4A90E2;
            color: #4A90E2;
        }

        .category-btn.active {
            background: linear-gradient(135deg, #4A90E2 0%, #5BA0F2 100%);
            color: white;
            border-color: #4A90E2;
            box-shadow: 0 2px 8px rgba(74, 144, 226, 0.3);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
            background: #fafbfc;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 65%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.7;
            white-space: pre-wrap;
            font-size: 15px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #4A90E2 0%, #5BA0F2 100%);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(74, 144, 226, 0.2);
        }

        .message.assistant .message-content {
            background: white;
            color: #3a474d;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #eef1f5;
        }

        .input-container {
            padding: 20px 32px;
            border-top: 1px solid #f0f0f0;
            flex-shrink: 0;
            background: white;
        }

        .input-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #e0e6ed;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
            background: #fafbfc;
        }

        input[type="text"]:focus {
            border-color: #4A90E2;
            background: white;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        input[type="text"]::placeholder {
            color: #a0aec0;
        }

        button.send-btn {
            padding: 14px 32px;
            background: linear-gradient(135deg, #4A90E2 0%, #5BA0F2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }

        button.send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(74, 144, 226, 0.4);
        }

        button.send-btn:active {
            transform: translateY(0);
        }

        button.send-btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .typing {
            display: flex;
            gap: 6px;
            padding: 14px 18px;
            background: white;
            border-radius: 16px;
            border: 1px solid #eef1f5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            max-width: 80px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #4A90E2;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .footer {
            text-align: center;
            padding: 12px;
            color: #a0aec0;
            font-size: 12px;
            flex-shrink: 0;
            background: white;
        }

        /* 滚动条美化 */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #d0d7de;
            border-radius: 3px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #b0b7be;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            body {
                padding: 0;
            }

            .container {
                border-radius: 0;
                height: 100vh;
            }

            .header {
                padding: 24px 20px;
            }

            .header h1 {
                font-size: 32px;
            }

            .category-selector {
                padding: 16px 20px;
                gap: 8px;
            }

            .category-btn {
                padding: 6px 14px;
                font-size: 13px;
            }

            .chat-container {
                padding: 20px;
            }

            .message-content {
                max-width: 80%;
                padding: 12px 16px;
                font-size: 14px;
            }

            .input-container {
                padding: 16px 20px;
            }

            input[type="text"] {
                padding: 12px 16px;
                font-size: 14px;
            }

            button.send-btn {
                padding: 12px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>一弭</h1>
            <p>人生智慧 · 一弭化解</p>
        </div>

        <div class="category-selector">
            <button class="category-btn active" data-category="general">全部</button>
            <button class="category-btn" data-category="workplace">职场智慧</button>
            <button class="category-btn" data-category="relationship">人际关系</button>
            <button class="category-btn" data-category="emotion">情感困扰</button>
            <button class="category-btn" data-category="direction">人生方向</button>
            <button class="category-btn" data-category="mood">情绪管理</button>
            <button class="category-btn" data-category="family">家庭关系</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-content">你好，我是一弭。有什么困惑，尽管说出来。</div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-group">
                <input type="text" id="userInput" placeholder="说说你的困惑..." />
                <button class="send-btn" id="sendBtn">发送</button>
            </div>
        </div>

        <div class="footer">
            onestand.cn · 一弭
        </div>
    </div>

    <script>
        let currentCategory = 'general';
        let history = [];

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
            });
        });

        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');

        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `<div class="message-content">${content}</div>`;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = `
                <div class="typing">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage('user', message);
            userInput.value = '';
            sendBtn.disabled = true;
            showTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        category: currentCategory,
                        history: history.slice(-4)
                    })
                });

                const data = await response.json();
                removeTyping();

                if (data.success) {
                    addMessage('assistant', data.reply);
                    history.push(
                        { role: 'user', content: message },
                        { role: 'assistant', content: data.reply }
                    );
                } else {
                    addMessage('assistant', `抱歉，出现了一些问题：${data.error}`);
                }
            } catch (error) {
                removeTyping();
                addMessage('assistant', '抱歉，网络出现了问题，请稍后再试。');
            }

            sendBtn.disabled = false;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
