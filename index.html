<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一弭 - 人生智慧指引</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "LXGW WenKai", "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
            background: #faf8f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #fffef9;
            border-radius: 16px;
            box-shadow: 0 2px 20px rgba(139, 69, 19, 0.08);
            max-width: 840px;
            width: 100%;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e8e0d5;
        }

        .header {
            background: linear-gradient(135deg, #fffef9 0%, #f8f4ed 100%);
            color: #8b4413;
            padding: 24px 40px 20px;
            text-align: center;
            flex-shrink: 0;
            border-bottom: 1px solid #e8e0d5;
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 12px;
            display: block;
            border-radius: 8px;
        }

        .header p {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 4px;
            color: #8b4413;
            font-family: "LXGW WenKai", "STLiti", "隶书", serif;
        }

        /* 一级分类 */
        .main-categories {
            display: flex;
            gap: 0;
            padding: 0;
            background: #f8f4ed;
            border-bottom: 1px solid #e8e0d5;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .main-category {
            padding: 14px 24px;
            background: transparent;
            color: #8b7355;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            font-weight: 400;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
        }

        .main-category:hover {
            color: #8b4413;
            background: #fffef9;
        }

        .main-category.active {
            color: #8b4413;
            background: #fffef9;
            border-bottom-color: #8b4413;
            font-weight: 500;
        }

        /* 二级分类 */
        .sub-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 14px 24px;
            border-bottom: 1px solid #e8e0d5;
            justify-content: flex-start;
            flex-shrink: 0;
            background: #fffef9;
        }

        .sub-category {
            padding: 5px 14px;
            border: 1px solid #d8cdb8;
            background: #faf8f5;
            color: #8b7355;
            border-radius: 16px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            font-weight: 400;
        }

        .sub-category:hover {
            background: #fff;
            border-color: #8b4413;
            color: #8b4413;
        }

        .sub-category.active {
            background: #8b4413;
            color: #fff;
            border-color: #8b4413;
        }

        /* 推荐问题 */
        .suggested-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 24px;
            background: #faf8f5;
            border-bottom: 1px solid #e8e0d5;
            flex-shrink: 0;
        }

        .suggested-questions-label {
            width: 100%;
            font-size: 11px;
            color: #b8a890;
            margin-bottom: 4px;
        }

        .suggested-question {
            padding: 6px 12px;
            background: #fff;
            border: 1px solid #e8e0d5;
            border-radius: 12px;
            font-size: 12px;
            color: #8b7355;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .suggested-question:hover {
            background: #8b4413;
            color: #fff;
            border-color: #8b4413;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #faf8f5;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 65%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.7;
            white-space: pre-wrap;
            font-size: 14px;
        }

        .message.user .message-content {
            background: #8b4413;
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(139, 68, 19, 0.15);
        }

        .message.assistant .message-content {
            background: #fff;
            color: #5a4a3a;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(139, 68, 19, 0.06);
            border: 1px solid #e8e0d5;
        }

        .input-container {
            padding: 16px 24px;
            border-top: 1px solid #e8e0d5;
            flex-shrink: 0;
            background: #fffef9;
        }

        /* 当前分类标签 */
        .current-category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: linear-gradient(135deg, #f8f4ed 0%, #fff 100%);
            border: 1px solid #d8cdb8;
            border-radius: 16px;
            font-size: 12px;
            color: #8b4413;
            margin-bottom: 10px;
        }

        .current-category-icon {
            width: 14px;
            height: 14px;
            background: #8b4413;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #d8cdb8;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
            background: #faf8f5;
            font-family: inherit;
        }

        input[type="text"]:focus {
            border-color: #8b4413;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(139, 68, 19, 0.08);
        }

        input[type="text"]::placeholder {
            color: #b8a890;
        }

        button.send-btn {
            padding: 12px 28px;
            background: #8b4413;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(139, 68, 19, 0.2);
            font-family: inherit;
        }

        button.send-btn:hover {
            background: #a0522d;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(139, 68, 19, 0.25);
        }

        button.send-btn:active {
            transform: translateY(0);
        }

        button.send-btn:disabled {
            background: #c8b8a8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .typing {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e8e0d5;
            box-shadow: 0 2px 8px rgba(139, 68, 19, 0.06);
            max-width: 70px;
        }

        .typing span {
            width: 7px;
            height: 7px;
            background: #8b4413;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .footer {
            text-align: center;
            padding: 10px;
            color: #b8a890;
            font-size: 11px;
            flex-shrink: 0;
            background: #fffef9;
            letter-spacing: 1px;
        }

        /* 滚动条美化 */
        .chat-container::-webkit-scrollbar,
        .sub-categories::-webkit-scrollbar,
        .main-categories::-webkit-scrollbar,
        .suggested-questions::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .chat-container::-webkit-scrollbar-track,
        .sub-categories::-webkit-scrollbar-track,
        .main-categories::-webkit-scrollbar-track,
        .suggested-questions::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb,
        .sub-categories::-webkit-scrollbar-thumb,
        .main-categories::-webkit-scrollbar-thumb,
        .suggested-questions::-webkit-scrollbar-thumb {
            background: #d8cdb8;
            border-radius: 2px;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            body {
                padding: 0;
            }

            .container {
                border-radius: 0;
                height: 100vh;
            }

            .header {
                padding: 20px 16px;
            }

            .logo {
                width: 56px;
                height: 56px;
            }

            .header p {
                font-size: 24px;
            }

            .main-categories {
                padding: 0;
            }

            .main-category {
                padding: 12px 16px;
                font-size: 13px;
            }

            .sub-categories {
                padding: 12px 16px;
                gap: 6px;
            }

            .sub-category {
                padding: 4px 12px;
                font-size: 11px;
            }

            .suggested-questions {
                padding: 10px 16px;
                gap: 6px;
            }

            .suggested-question {
                padding: 5px 10px;
                font-size: 11px;
            }

            .chat-container {
                padding: 16px;
            }

            .message-content {
                max-width: 80%;
                padding: 10px 14px;
                font-size: 13px;
            }

            .input-container {
                padding: 12px 16px;
            }

            .current-category {
                font-size: 11px;
                padding: 5px 10px;
            }

            input[type="text"] {
                padding: 10px 14px;
                font-size: 13px;
            }

            button.send-btn {
                padding: 10px 20px;
                font-size: 13px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;500&display=swap" rel="stylesheet">
</head>

        <div class="footer">

                        id: 'confidence', 
                        name: '自信心建立',
                        questions: ['如何提升自信心？', '总是不自信怎么办？', '如何克服自卑心理？']
                    },
                    { 
                        id: 'habits', 
                        name: '好习惯养成',
                        questions: ['如何养成好习惯？', '总是三分钟热度怎么办？', '如何戒掉坏习惯？']
                    },
                    { 
                        id: 'learning', 
                        name: '学习方法优化',
                        questions: ['如何提高学习效率？', '学了就忘怎么办？', '如何保持持续学习？']
                    },
                    { 
                        id: 'time-manage', 
                        name: '时间管理技巧',
                        questions: ['如何高效管理时间？', '总是拖延怎么办？', '如何做好时间规划？']
                    },
                    { 
                        id: 'emotion-control', 
                        name: '情绪管理能力',
                        questions: ['如何控制情绪？', '容易冲动怎么办？', '如何管理负面情绪？']
                    },
                    { 
                        id: 'charisma', 
                        name: '个人魅力提升',
                        questions: ['如何提升个人魅力？', '如何提升说话水平？', '如何让人印象深刻？']
                    }
                ]
            }
        };

        let currentMainCategory = 'workplace';
        let currentSubCategory = 'workplace-conflict';
        let history = [];

        // 初始化
        function init() {
            renderSubCategories('workplace');
            updateCurrentCategoryDisplay();

            document.querySelectorAll('.main-category').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.main-category').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentMainCategory = this.dataset.category;
                    renderSubCategories(currentMainCategory);
                    updateCurrentCategoryDisplay();
                });
            });
        }

        // 更新当前分类显示
        function updateCurrentCategoryDisplay() {
            const mainCategory = CATEGORIES[currentMainCategory];
            const subCategory = mainCategory.subs.find(s => s.id === currentSubCategory);
            
            const categoryText = document.getElementById('categoryText');
            categoryText.textContent = `${mainCategory.name} · ${subCategory ? subCategory.name : ''}`;
        }

        // 渲染二级分类
        function renderSubCategories(mainCategory) {
            const container = document.getElementById('subCategories');
            const category = CATEGORIES[mainCategory];

            if (!category || !category.subs) {
                console.error('分类不存在:', mainCategory);
                return;
            }

            container.innerHTML = category.subs.map((sub, index) => 
                `<button class="sub-category ${index === 0 ? 'active' : ''}" data-id="${sub.id}">${sub.name}</button>`
            ).join('');

            currentSubCategory = category.subs[0].id;
            renderSuggestedQuestions(category.subs[0]);
            updateCurrentCategoryDisplay();

            container.querySelectorAll('.sub-category').forEach(btn => {
                btn.addEventListener('click', function() {
                    container.querySelectorAll('.sub-category').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentSubCategory = this.dataset.id;
                    
                    const subCat = category.subs.find(s => s.id === currentSubCategory);
                    renderSuggestedQuestions(subCat);
                    updateCurrentCategoryDisplay();
                });
            });
        }

        // 渲染推荐问题
        function renderSuggestedQuestions(subCategory) {
            const container = document.getElementById('suggestedQuestions');
            
            if (!subCategory || !subCategory.questions || subCategory.questions.length === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = `
                <div class="suggested-questions-label">试试这些问题：</div>
                ${subCategory.questions.map(q => 
                    `<button class="suggested-question">${q}</button>`
                ).join('')}
            `;

            // 绑定点击事件
            container.querySelectorAll('.suggested-question').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.getElementById('userInput').value = this.textContent;
                    document.getElementById('userInput').focus();
                });
            });
        }

        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');

        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `<div class="message-content">${content}</div>`;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage('user', message);
            userInput.value = '';
            sendBtn.disabled = true;
            showTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        category: currentSubCategory,
                        history: history.slice(-4)
                    })
                });

                const data = await response.json();
                removeTyping();

                if (data.success) {
                    addMessage('assistant', data.reply);
                    history.push(
                        { role: 'user', content: message },
                        { role: 'assistant', content: data.reply }
                    );
                } else {
                    addMessage('assistant', `抱歉，出现了一些问题：${data.error}`);
                }
            } catch (error) {
                removeTyping();
                addMessage('assistant', '抱歉，网络出现了问题，请稍后再试。');
            }

            sendBtn.disabled = false;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        init();
    </script>
</body>
</html>
