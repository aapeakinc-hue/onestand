<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一弭 - 人生智慧指引</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: "LXGW WenKai", "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
            background: #f5f3f0;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: #fffef9;
        }

        /* 顶部标题栏 */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 20px 32px;
            background: linear-gradient(135deg, #fffef9 0%, #f8f4ed 100%);
            border-bottom: 1px solid #e8e0d5;
            flex-shrink: 0;
            position: relative;
        }

        .logo {
            width: 48px;
            height: 48px;
            border-radius: 8px;
        }

        .header-text {
            font-size: 26px;
            font-weight: 400;
            letter-spacing: 4px;
            color: #8b4413;
            font-family: "LXGW WenKai", "STLiti", "隶书", serif;
        }

        .header-actions {
            position: absolute;
            right: 32px;
            display: flex;
            gap: 12px;
        }

        .header-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #d8cdb8;
            border-radius: 20px;
            font-size: 13px;
            color: #8b7355;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .header-btn:hover {
            background: #8b4413;
            color: #fff;
            border-color: #8b4413;
        }

        /* 一级分类 */
        .main-categories {
            display: flex;
            gap: 0;
            background: #f8f4ed;
            border-bottom: 1px solid #e8e0d5;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .main-categories::-webkit-scrollbar {
            height: 0;
        }

        .main-category {
            padding: 14px 28px;
            background: transparent;
            color: #8b7355;
            border: none;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s ease;
            font-weight: 400;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
        }

        .main-category:hover {
            color: #8b4413;
            background: #fffef9;
        }

        .main-category.active {
            color: #8b4413;
            background: #fffef9;
            border-bottom-color: #8b4413;
            font-weight: 500;
        }

        /* 二级分类 + 推荐问题 */
        .category-section {
            display: flex;
            flex-direction: column;
            background: #fffef9;
            border-bottom: 1px solid #e8e0d5;
            flex-shrink: 0;
            max-height: 120px;
            overflow: hidden;
        }

        .sub-categories {
            display: flex;
            flex-wrap: nowrap;
            gap: 10px;
            padding: 12px 24px 8px;
            overflow-x: auto;
        }

        .sub-categories::-webkit-scrollbar {
            height: 0;
        }

        .sub-category {
            padding: 6px 16px;
            border: 1px solid #d8cdb8;
            background: #faf8f5;
            color: #8b7355;
            border-radius: 18px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            font-weight: 400;
            white-space: nowrap;
        }

        .sub-category:hover {
            background: #fff;
            border-color: #8b4413;
            color: #8b4413;
        }

        .sub-category.active {
            background: #8b4413;
            color: #fff;
            border-color: #8b4413;
        }

        .suggested-questions {
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            padding: 0 24px 12px;
            overflow-x: auto;
            align-items: center;
        }

        .suggested-questions::-webkit-scrollbar {
            height: 0;
        }

        .suggested-questions-label {
            font-size: 12px;
            color: #b8a890;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .suggested-question {
            padding: 5px 12px;
            background: #fff;
            border: 1px solid #e8e0d5;
            border-radius: 14px;
            font-size: 12px;
            color: #8b7355;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .suggested-question:hover {
            background: #8b4413;
            color: #fff;
            border-color: #8b4413;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            background: #faf8f5;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #d8cdb8;
            border-radius: 3px;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 14px 20px;
            border-radius: 18px;
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 15px;
        }

        .message.user .message-content {
            background: #8b4413;
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 10px rgba(139, 68, 19, 0.15);
        }

        .message.assistant .message-content {
            background: #fff;
            color: #5a4a3a;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 10px rgba(139, 68, 19, 0.06);
            border: 1px solid #e8e0d5;
        }

        /* 消息操作按钮 */
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 4px 10px;
            background: #fff;
            border: 1px solid #e8e0d5;
            border-radius: 12px;
            font-size: 11px;
            color: #8b7355;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn:hover {
            background: #8b4413;
            color: #fff;
            border-color: #8b4413;
        }

        .action-btn.copied {
            background: #4a9;
            color: #fff;
            border-color: #4a9;
        }

        .action-btn.favorited {
            background: #f5a623;
            color: #fff;
            border-color: #f5a623;
        }

        .action-btn.liked {
            background: #4a9;
            color: #fff;
            border-color: #4a9;
        }

        .action-btn.disliked {
            background: #e74c3c;
            color: #fff;
            border-color: #e74c3c;
        }

        /* 反馈区域 */
        .feedback-section {
            display: none;
            margin-top: 12px;
            padding: 12px 16px;
            background: #faf8f5;
            border-radius: 12px;
            border: 1px solid #e8e0d5;
            max-width: 70%;
        }

        .feedback-section.show {
            display: block;
        }

        .feedback-title {
            font-size: 12px;
            color: #8b7355;
            margin-bottom: 10px;
        }

        .feedback-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .feedback-tag {
            padding: 4px 10px;
            background: #fff;
            border: 1px solid #e8e0d5;
            border-radius: 12px;
            font-size: 11px;
            color: #8b7355;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .feedback-tag:hover,
        .feedback-tag.selected {
            background: #8b4413;
            color: #fff;
            border-color: #8b4413;
        }

        .feedback-input {
            display: flex;
            gap: 8px;
        }

        .feedback-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e8e0d5;
            border-radius: 16px;
            font-size: 12px;
            outline: none;
            background: #fff;
        }

        .feedback-input input:focus {
            border-color: #8b4413;
        }

        .feedback-submit {
            padding: 8px 16px;
            background: #8b4413;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .feedback-submit:hover {
            background: #a0522d;
        }

        .feedback-thanks {
            font-size: 12px;
            color: #4a9;
            display: none;
        }

        .feedback-thanks.show {
            display: block;
        }

        /* 底部输入区域 */
        .input-area {
            padding: 16px 32px 20px;
            background: #fffef9;
            border-top: 1px solid #e8e0d5;
            flex-shrink: 0;
        }

        .current-category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: linear-gradient(135deg, #f8f4ed 0%, #fff 100%);
            border: 1px solid #d8cdb8;
            border-radius: 16px;
            font-size: 12px;
            color: #8b4413;
            margin-bottom: 12px;
        }

        .current-category-icon {
            width: 16px;
            height: 16px;
            background: #8b4413;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #d8cdb8;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
            background: #faf8f5;
            font-family: inherit;
        }

        input[type="text"]:focus {
            border-color: #8b4413;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(139, 68, 19, 0.08);
        }

        input[type="text"]::placeholder {
            color: #b8a890;
        }

        .input-actions {
            display: flex;
            gap: 8px;
        }

        .voice-btn {
            width: 48px;
            height: 48px;
            background: #f8f4ed;
            border: 1px solid #d8cdb8;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .voice-btn:hover {
            background: #fff;
            border-color: #8b4413;
        }

        .voice-btn.recording {
            background: #8b4413;
            color: #fff;
            border-color: #8b4413;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        button.send-btn {
            padding: 14px 32px;
            background: #8b4413;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(139, 68, 19, 0.2);
            font-family: inherit;
        }

        button.send-btn:hover {
            background: #a0522d;
            transform: translateY(-1px);
            box-shadow: 0 5px 16px rgba(139, 68, 19, 0.25);
        }

        button.send-btn:active {
            transform: translateY(0);
        }

        button.send-btn:disabled {
            background: #c8b8a8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .typing {
            display: flex;
            gap: 6px;
            padding: 14px 20px;
            background: #fff;
            border-radius: 18px;
            border: 1px solid #e8e0d5;
            box-shadow: 0 2px 10px rgba(139, 68, 19, 0.06);
            max-width: 70px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #8b4413;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .footer {
            text-align: center;
            padding: 8px;
            color: #b8a890;
            font-size: 11px;
            background: #fffef9;
            letter-spacing: 1px;
        }

        /* 历史记录侧边栏 */
        .history-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: #fffef9;
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
            transition: right 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .history-sidebar.open {
            right: 0;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #e8e0d5;
        }

        .history-title {
            font-size: 18px;
            font-weight: 500;
            color: #8b4413;
        }

        .history-close {
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            font-size: 24px;
            color: #8b7355;
            cursor: pointer;
        }

        .history-tabs {
            display: flex;
            border-bottom: 1px solid #e8e0d5;
        }

        .history-tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            font-size: 14px;
            color: #8b7355;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .history-tab.active {
            color: #8b4413;
            border-bottom-color: #8b4413;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .history-item {
            padding: 12px 16px;
            background: #faf8f5;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: #fff;
            border-color: #8b4413;
        }

        .history-item-title {
            font-size: 14px;
            color: #5a4a3a;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item-time {
            font-size: 11px;
            color: #b8a890;
        }

        .history-item-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .history-item-btn {
            padding: 4px 8px;
            background: #fff;
            border: 1px solid #e8e0d5;
            border-radius: 8px;
            font-size: 11px;
            color: #8b7355;
            cursor: pointer;
        }

        .history-item-btn:hover {
            background: #8b4413;
            color: #fff;
            border-color: #8b4413;
        }

        .history-empty {
            text-align: center;
            padding: 40px 20px;
            color: #b8a890;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        /* 分享弹窗 */
        .share-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: #fffef9;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1001;
        }

        .share-modal.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .share-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .share-modal-title {
            font-size: 18px;
            font-weight: 500;
            color: #8b4413;
        }

        .share-modal-close {
            width: 28px;
            height: 28px;
            background: transparent;
            border: none;
            font-size: 20px;
            color: #8b7355;
            cursor: pointer;
        }

        .share-card {
            background: linear-gradient(135deg, #f8f4ed 0%, #fff 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e8e0d5;
        }

        .share-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e8e0d5;
        }

        .share-card-logo {
            width: 32px;
            height: 32px;
            border-radius: 6px;
        }

        .share-card-brand {
            font-size: 16px;
            color: #8b4413;
            font-weight: 500;
        }

        .share-card-question {
            font-size: 14px;
            color: #5a4a3a;
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(139, 68, 19, 0.05);
            border-radius: 8px;
        }

        .share-card-answer {
            font-size: 14px;
            color: #5a4a3a;
            line-height: 1.7;
        }

        .share-card-footer {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #e8e0d5;
            text-align: center;
            font-size: 12px;
            color: #b8a890;
        }

        .share-actions {
            display: flex;
            gap: 12px;
        }

        .share-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .share-btn.primary {
            background: #8b4413;
            color: #fff;
            border: none;
        }

        .share-btn.primary:hover {
            background: #a0522d;
        }

        .share-btn.secondary {
            background: #fff;
            color: #8b4413;
            border: 1px solid #8b4413;
        }

        .share-btn.secondary:hover {
            background: #f8f4ed;
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1002;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .container {
                max-width: 100%;
            }

            .header {
                padding: 16px 20px;
                gap: 12px;
            }

            .header-actions {
                right: 16px;
            }

            .header-btn {
                padding: 6px 12px;
                font-size: 12px;
            }

            .logo {
                width: 40px;
                height: 40px;
            }

            .header-text {
                font-size: 22px;
                letter-spacing: 3px;
            }

            .main-category {
                padding: 12px 20px;
                font-size: 14px;
            }

            .sub-categories {
                padding: 10px 16px 6px;
                gap: 8px;
            }

            .sub-category {
                padding: 5px 12px;
                font-size: 12px;
            }

            .suggested-questions {
                padding: 0 16px 10px;
                gap: 6px;
            }

            .suggested-question {
                padding: 4px 10px;
                font-size: 11px;
            }

            .chat-container {
                padding: 16px 20px;
            }

            .message-content {
                max-width: 85%;
                padding: 12px 16px;
                font-size: 14px;
            }

            .feedback-section {
                max-width: 85%;
            }

            .input-area {
                padding: 12px 16px 16px;
            }

            .current-category {
                font-size: 11px;
                padding: 4px 10px;
            }

            input[type="text"] {
                padding: 12px 16px;
                font-size: 14px;
            }

            button.send-btn {
                padding: 12px 24px;
                font-size: 14px;
            }

            .history-sidebar {
                width: 100%;
                right: -100%;
            }

            .share-modal {
                width: 95%;
                padding: 16px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 顶部标题栏 -->
        <div class="header">
            <img src="logo.jpg" alt="一弭" class="logo" />
            <span class="header-text">人生智慧 · 一弭化解</span>
            <div class="header-actions">
                <button class="header-btn" id="historyBtn">历史</button>
            </div>
        </div>

        <!-- 一级分类 -->
        <div class="main-categories" id="mainCategories">
            <button class="main-category active" data-category="workplace">职场事业</button>
            <button class="main-category" data-category="social">人际交往</button>
            <button class="main-category" data-category="love">情感婚恋</button>
            <button class="main-category" data-category="family">家庭关系</button>
            <button class="main-category" data-category="life">人生规划</button>
            <button class="main-category" data-category="mental">心理调适</button>

            },

                subs: [
                    { id: 'confidence', name: '自信心建立', questions: ['如何提升自信心？', '总是不自信怎么办？', '如何克服自卑心理？'] },

        // 反馈标签
        const FEEDBACK_TAGS = [
            { id: 'too-long', label: '太长' },
            { id: 'too-short', label: '太短' },
            { id: 'too-deep', label: '太深奥' },
            { id: 'too-simple', label: '太浅显' },
            { id: 'off-topic', label: '答非所问' },
            { id: 'not-specific', label: '不够具体' },
            { id: 'not-practical', label: '不够实用' },
            { id: 'other', label: '其他问题' }
        ];

        let currentMainCategory = 'workplace';
        let currentSubCategory = 'workplace-conflict';
        let history = [];
        let conversations = [];
        let favorites = [];
        let feedbacks = [];
        let currentTab = 'history';
        let recognition = null;

        // 初始化
        function init() {
            loadFromStorage();
            renderSubCategories('workplace');
            updateCategoryDisplay();

            document.querySelectorAll('.main-category').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.main-category').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentMainCategory = this.dataset.category;
                    renderSubCategories(currentMainCategory);
                    updateCategoryDisplay();
                });
            });

            document.getElementById('historyBtn').addEventListener('click', openHistorySidebar);
            document.getElementById('historyClose').addEventListener('click', closeHistorySidebar);
            document.getElementById('overlay').addEventListener('click', function() {
                closeHistorySidebar();
                closeShareModal();
            });

            document.querySelectorAll('.history-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.history-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentTab = this.dataset.tab;
                    renderHistoryList();
                });
            });

            document.getElementById('shareModalClose').addEventListener('click', closeShareModal);
            document.getElementById('copyShareBtn').addEventListener('click', copyShareText);
            document.getElementById('saveShareBtn').addEventListener('click', saveShareImage);

            initVoiceRecognition();
        }

        // 本地存储
        function loadFromStorage() {
            try {
                const savedConversations = localStorage.getItem('yimi_conversations');
                const savedFavorites = localStorage.getItem('yimi_favorites');
                const savedFeedbacks = localStorage.getItem('yimi_feedbacks');
                if (savedConversations) conversations = JSON.parse(savedConversations);
                if (savedFavorites) favorites = JSON.parse(savedFavorites);
                if (savedFeedbacks) feedbacks = JSON.parse(savedFeedbacks);
            } catch (e) {
                console.error('加载存储失败', e);
            }
        }

        function saveToStorage() {
            try {
                localStorage.setItem('yimi_conversations', JSON.stringify(conversations));
                localStorage.setItem('yimi_favorites', JSON.stringify(favorites));
                localStorage.setItem('yimi_feedbacks', JSON.stringify(feedbacks));
            } catch (e) {
                console.error('保存存储失败', e);
            }
        }

        function updateCategoryDisplay() {
            const main = CATEGORIES[currentMainCategory];
            const sub = main.subs.find(s => s.id === currentSubCategory);
            document.getElementById('categoryText').textContent = `${main.name} · ${sub ? sub.name : ''}`;
        }

        function renderSubCategories(mainCategory) {
            const container = document.getElementById('subCategories');
            const category = CATEGORIES[mainCategory];

            container.innerHTML = category.subs.map((sub, i) => 
                `<button class="sub-category ${i === 0 ? 'active' : ''}" data-id="${sub.id}">${sub.name}</button>`
            ).join('');

            currentSubCategory = category.subs[0].id;
            renderQuestions(category.subs[0]);
            updateCategoryDisplay();

            container.querySelectorAll('.sub-category').forEach(btn => {
                btn.addEventListener('click', function() {
                    container.querySelectorAll('.sub-category').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentSubCategory = this.dataset.id;
                    const sub = category.subs.find(s => s.id === currentSubCategory);
                    renderQuestions(sub);
                    updateCategoryDisplay();
                });
            });
        }

        function renderQuestions(sub) {
            const container = document.getElementById('suggestedQuestions');
            if (!sub || !sub.questions) { container.innerHTML = ''; return; }
            container.innerHTML = `<span class="suggested-questions-label">试试：</span>` + 
                sub.questions.map(q => `<button class="suggested-question">${q}</button>`).join('');
            container.querySelectorAll('.suggested-question').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.getElementById('userInput').value = this.textContent;
                    document.getElementById('userInput').focus();
                });
            });
        }

        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');

        function addMessage(role, content, saveToHistory = true) {
            const messageId = Date.now();
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.dataset.id = messageId;
            
            if (role === 'assistant') {
                div.innerHTML = `
                    <div class="message-content">${content}</div>
                    <div class="message-actions">
                        <button class="action-btn" onclick="copyMessage('${messageId}', this)">复制</button>
                        <button class="action-btn" onclick="favoriteMessage('${messageId}', this)">收藏</button>
                        <button class="action-btn" onclick="shareMessage('${messageId}', this)">分享</button>
                        <button class="action-btn" onclick="toggleFeedback('${messageId}', 'like', this)">👍 有帮助</button>
                        <button class="action-btn" onclick="toggleFeedback('${messageId}', 'dislike', this)">👍 没帮助</button>
                    </div>
                    <div class="feedback-section" id="feedback-${messageId}">
                        <div class="feedback-title">请告诉我们哪里需要改进：</div>
                        <div class="feedback-tags">
                            ${FEEDBACK_TAGS.map(tag => 
                                `<button class="feedback-tag" data-tag="${tag.id}" onclick="selectFeedbackTag('${messageId}', '${tag.id}', this)">${tag.label}</button>`
                            ).join('')}
                        </div>
                        <div class="feedback-input">
                            <input type="text" placeholder="其他建议..." id="feedback-input-${messageId}" />
                            <button class="feedback-submit" onclick="submitFeedback('${messageId}')">提交</button>
                        </div>
                        <div class="feedback-thanks" id="feedback-thanks-${messageId}">感谢您的反馈，我们会持续改进！</div>
                    </div>
                `;
            } else {
                div.innerHTML = `<div class="message-content">${content}</div>`;
            }
            
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return messageId;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typing';
            div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('typing');
            if (t) t.remove();
        }

        // 复制消息
        function copyMessage(messageId, btn) {
            const msg = document.querySelector(`.message[data-id="${messageId}"] .message-content`);
            if (msg) {
                navigator.clipboard.writeText(msg.textContent).then(() => {
                    btn.textContent = '已复制';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = '复制';
                        btn.classList.remove('copied');
                    }, 2000);
                });
            }
        }

        // 收藏消息
        function favoriteMessage(messageId, btn) {
            const msg = document.querySelector(`.message[data-id="${messageId}"] .message-content`);
            if (msg) {
                const favorite = {
                    id: messageId,
                    content: msg.textContent,
                    time: new Date().toLocaleString('zh-CN')
                };
                favorites.unshift(favorite);
                saveToStorage();
                
                btn.textContent = '已收藏';
                btn.classList.add('favorited');
                showToast('已收藏到我的收藏');
            }
        }

        // 分享消息
        let currentShareData = null;
        
        function shareMessage(messageId, btn) {
            const messageDiv = document.querySelector(`.message[data-id="${messageId}"]`);
            const answerContent = messageDiv.querySelector('.message-content').textContent;
            
            let questionContent = '';
            const prevMessage = messageDiv.previousElementSibling;
            if (prevMessage && prevMessage.classList.contains('user')) {
                questionContent = prevMessage.querySelector('.message-content').textContent;
            }
            
            currentShareData = {
                question: questionContent,
                answer: answerContent
            };
            
            document.getElementById('shareQuestion').textContent = questionContent ? `问：${questionContent}` : '';
            document.getElementById('shareAnswer').textContent = answerContent;
            
            document.getElementById('shareModal').classList.add('show');
            document.getElementById('overlay').classList.add('show');
        }

        function closeShareModal() {
            document.getElementById('shareModal').classList.remove('show');
        }

        function copyShareText() {
            const text = `【一弭 · 人生智慧】\n\n问：${currentShareData.question}\n\n答：${currentShareData.answer}\n\n—— onestand.cn`;
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板');
                closeShareModal();
            });
        }

        function saveShareImage() {
            showToast('请截图保存分享卡片');
            closeShareModal();
        }

        // 反馈功能
        function toggleFeedback(messageId, type, btn) {
            const feedbackSection = document.getElementById(`feedback-${messageId}`);
            const allBtns = btn.parentElement.querySelectorAll('.action-btn');
            
            // 重置所有按钮
            allBtns.forEach(b => {
                if (b.textContent.includes('有帮助') || b.textContent.includes('没帮助')) {
                    b.classList.remove('liked', 'disliked');
                }
            });
            
            if (type === 'like') {
                btn.classList.add('liked');
                // 直接提交正面反馈
                saveFeedback(messageId, { rating: 'positive' });
                showToast('感谢您的认可！');
            } else {
                btn.classList.add('disliked');
                // 显示详细反馈表单
                feedbackSection.classList.add('show');
            }
        }

        function selectFeedbackTag(messageId, tagId, btn) {
            btn.classList.toggle('selected');
        }

        function submitFeedback(messageId) {
            const feedbackSection = document.getElementById(`feedback-${messageId}`);
            const selectedTags = feedbackSection.querySelectorAll('.feedback-tag.selected');
            const input = document.getElementById(`feedback-input-${messageId}`);
            
            const tags = Array.from(selectedTags).map(t => t.dataset.tag);
            const comment = input.value.trim();
            
            if (tags.length === 0 && !comment) {
                showToast('请选择问题标签或输入建议');
                return;
            }
            
            const feedback = {
                id: Date.now(),
                messageId: messageId,
                rating: 'negative',
                tags: tags,
                comment: comment,
                time: new Date().toLocaleString('zh-CN')
            };
            
            saveFeedback(messageId, feedback);
            
            // 显示感谢信息
            feedbackSection.querySelector('.feedback-input').style.display = 'none';
            feedbackSection.querySelector('.feedback-tags').style.display = 'none';
            feedbackSection.querySelector('.feedback-title').style.display = 'none';
            document.getElementById(`feedback-thanks-${messageId}`).classList.add('show');
            
            showToast('感谢您的反馈！');
        }

        function saveFeedback(messageId, feedback) {
            // 获取对应的问题和回答
            const messageDiv = document.querySelector(`.message[data-id="${messageId}"]`);
            const answer = messageDiv.querySelector('.message-content').textContent;
            
            let question = '';
            const prevMessage = messageDiv.previousElementSibling;
            if (prevMessage && prevMessage.classList.contains('user')) {
                question = prevMessage.querySelector('.message-content').textContent;
            }
            
            const fullFeedback = {
                ...feedback,
                question: question,
                answer: answer,
                category: currentSubCategory
            };
            
            feedbacks.unshift(fullFeedback);
            saveToStorage();
            
            // 发送到服务器（可选）
            sendFeedbackToServer(fullFeedback);
        }

        async function sendFeedbackToServer(feedback) {
            try {
                await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(feedback)
                });
            } catch (e) {
                // 静默失败，不影响用户体验
                console.log('反馈上传失败', e);
            }
        }

        // 历史记录
        function openHistorySidebar() {
            document.getElementById('historySidebar').classList.add('open');
            document.getElementById('overlay').classList.add('show');
            renderHistoryList();
        }

        function closeHistorySidebar() {
            document.getElementById('historySidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }

        function renderHistoryList() {
            const container = document.getElementById('historyList');
            const list = currentTab === 'history' ? conversations : favorites;
            
            if (list.length === 0) {
                container.innerHTML = `<div class="history-empty">${currentTab === 'history' ? '暂无对话历史' : '暂无收藏内容'}</div>`;
                return;
            }
            
            container.innerHTML = list.map(item => `
                <div class="history-item">
                    <div class="history-item-title">${item.content.substring(0, 50)}...</div>
                    <div class="history-item-time">${item.time}</div>
                    <div class="history-item-actions">
                        <button class="history-item-btn" onclick="copyHistoryItem('${item.id}')">复制</button>
                        <button class="history-item-btn" onclick="deleteHistoryItem('${item.id}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function copyHistoryItem(id) {
            const item = [...conversations, ...favorites].find(i => i.id == id);
            if (item) {
                navigator.clipboard.writeText(item.content).then(() => {
                    showToast('已复制');
                });
            }
        }

        function deleteHistoryItem(id) {
            conversations = conversations.filter(i => i.id != id);
            favorites = favorites.filter(i => i.id != id);
            saveToStorage();
            renderHistoryList();
            showToast('已删除');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 发送消息
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage('user', message);
            userInput.value = '';
            sendBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, category: currentSubCategory, history: history.slice(-4) })
                });
                const data = await res.json();
                removeTyping();
                
                if (data.success) {
                    const answerId = addMessage('assistant', data.reply);
                    
                    const conversation = {
                        id: answerId,
                        question: message,
                        content: data.reply,
                        category: currentSubCategory,
                        time: new Date().toLocaleString('zh-CN')
                    };
                    conversations.unshift(conversation);
                    if (conversations.length > 50) conversations.pop();
                    saveToStorage();
                    
                    history.push({ role: 'user', content: message }, { role: 'assistant', content: data.reply });
                } else {
                    addMessage('assistant', `抱歉：${data.error}`);
                }
            } catch (e) {
                removeTyping();
                addMessage('assistant', '网络异常，请稍后再试。');
            }
            sendBtn.disabled = false;
        }

        // 语音识别
        function initVoiceRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                document.getElementById('voiceBtn').style.display = 'none';
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
                userInput.focus();
            };

            recognition.onerror = function(event) {
                showToast('语音识别失败，请重试');
                document.getElementById('voiceBtn').classList.remove('recording');
            };

            recognition.onend = function() {
                document.getElementById('voiceBtn').classList.remove('recording');
            };

            document.getElementById('voiceBtn').addEventListener('click', function() {
                if (this.classList.contains('recording')) {
                    recognition.stop();
                    this.classList.remove('recording');
                } else {
                    recognition.start();
                    this.classList.add('recording');
                    showToast('正在聆听...');
                }
            });
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

        init();
    </script>
</body>
</html>
