<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一弭 - 人生智慧指引</title>
    
    <!-- 百度统计 -->
    <script>
    var _hmt = _hmt || [];
    (function() {
      var hm = document.createElement("script");
      hm.src = "https://hm.baidu.com/hm.js?3012fd8942ed238a0217a8843b019f7e";
      var s = document.getElementsByTagName("script")[0];
      s.parentNode.insertBefore(hm, s);
    })();
    </script>
    
    <!-- 样式 -->
    <link rel="stylesheet" href="style.css">
    <!-- 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 顶部标题栏 -->
        <div class="header">
            <div class="logo">
                <img src="logo.jpg" alt="一弭logo">
            </div>
            <span class="header-text">人生智慧 · 一弭化解</span>
            <button class="header-btn" id="historyBtn">历史</button>
        </div>

        <!-- 分类区域 -->
        <div class="categories-section">
            <div class="main-categories" id="mainCategories"></div>
            <div class="sub-categories" id="subCategories"></div>
            <div class="suggested-questions" id="suggestedQuestions"></div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-content">你好，我是一弭。选择一个分类，说说你的困惑。</div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <div class="current-category" id="currentCategory">
                <span class="current-category-icon">✓</span>
                <span id="categoryText">选择分类</span>
            </div>
            <div class="input-group">
                <input type="text" id="userInput" placeholder="说说你的困惑..." />
                <button class="voice-btn" id="voiceBtn">🎤</button>
                <button class="send-btn" id="sendBtn">发送</button>
            </div>
        </div>

        <div class="footer">onestand.cn · 一弭</div>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <!-- 脚本 -->
    <script type="module" src="app.js"></script>
</body>
</html>
